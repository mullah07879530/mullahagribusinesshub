<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mullah Agrihub - Update Password</title>
    <style>
        body { 
            font-family: 'Times New Roman', Times, serif; margin: 0; display: flex; min-height: 100vh; 
            background: linear-gradient(rgba(244, 249, 244, 0.85), rgba(244, 249, 244, 0.85)), url('https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .sidebar { width: 280px; background-color: #002e00; color: white; padding-top: 30px; border-right: 2px solid #001a00; flex-shrink: 0; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li a { display: block; padding: 15px 25px; color: #b3ffb3; text-decoration: none; border-bottom: 1px solid #004d00; }
        .sidebar-menu li a:hover { background-color: #004d00; color: white; }
        .sidebar-menu li.active a { background-color: #004d00; color: white; font-weight: bold; border-radius: 4px; margin: 5px 10px; padding: 12px 15px; }

        .main-content { flex: 1; padding: 30px; box-sizing: border-box; }
        header { background-color: #004d00; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; margin-bottom: 30px; }
        .password-container { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; color: #004d00; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit-pass { background: #a04000; color: white; border: none; padding: 14px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-back { display: inline-block; margin-bottom: 20px; color: #004d00; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div style="text-align: center; padding-bottom: 20px; border-bottom: 1px solid #004d00;">
        <h3 style="color: white; margin: 0; font-size: 20px;">MULLAH AGRIHUB</h3>
    </div>
    <ul class="sidebar-menu">
        <li><a href="client-dashboard.html">Dashboard Home</a></li>
        <li><a href="client-shop.html">Shop / Iguriro</a></li>
        <li><a href="request-services.html">Request Advisory/Vet</a></li>
        <li><a href="my-orders.html">My Orders & Invoices</a></li>
        <li class="active"><a href="profile-settings.html">My Profile Settings</a></li>
        <li><a href="index.html" class="exit-portal">Exit Portal</a></li>
    </ul>
</nav>

<main class="main-content">
    <header>
        <div><b>Update Password / Umubare w'Ibanga</b></div>
        <div>Portal: Active</div>
    </header>

    <a href="profile-settings.html" class="btn-back">⬅️ Subira inyuma muli Settings</a>

    <div class="password-container">
        <h3 style="color: #004d00; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid #a04000; padding-bottom: 8px;">🔑 Guhindura Umubare w'Ibanga</h3>
        <form id="securityForm" onsubmit="changePassword(event)">
            <div class="form-group">
                <label>Umubare w'Ibanga usanganywe:</label>
                <input type="password" id="currentPassword" class="form-control" placeholder="******" required>
            </div>
            <div class="form-group">
                <label>Umubare w'Ibanga Mushya:</label>
                <input type="password" id="newPassword" class="form-control" placeholder="Wandika umushya hano" required>
            </div>
            <div class="form-group">
                <label>Subiramo Umubare w'Ibanga Mushya:</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Subiramo umushya hano" required>
            </div>
            <button type="submit" class="btn-submit-pass">Hindura Password</button>
        </form>
    </div>
</main>

<script>
    function changePassword(event) {
        event.preventDefault();
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;

        if (newPass !== confirmPass) {
            alert("❌ Umubare w'ibanga mushya ntabwo uhuye!");
            return;
        }
        alert("🔒 Umubare w'ibanga (Password) wawe wahinduwe neza!");
        window.location.href = 'profile-settings.html';
    }
</script>

</body>
</html>
