<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mullah Agrihub - Secure Checkout</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; background-color: #f0f4f0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .checkout-card {
            background: white; width: 450px; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 15px solid #004d00;
            text-align: center;
        }

        h2 { color: #004d00; margin-bottom: 10px; }
        .sub-title { color: #555; font-size: 14px; margin-bottom: 25px; }

        .total-box {
            background: #e8f5e9; padding: 20px; border-radius: 12px;
            font-size: 24px; font-weight: bold; color: #1b5e20; margin-bottom: 30px;
        }

        .payment-methods { display: flex; gap: 15px; margin-bottom: 30px; }
        .method {
            flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 12px;
            cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s;
        }
        .method.active-momo { border-color: #ffc107; background: #fffde7; }
        .method.active-airtel { border-color: #ff5252; background: #ffebee; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .form-group input { 
            width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box;
        }

        .btn-pay {
            background: #004d00; color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; text-transform: uppercase;
        }

        .note { font-size: 12px; color: #888; margin-top: 20px; line-height: 1.5; }
        .cancel-btn { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="checkout-card">
    <h2>Secure Checkout</h2>
    <p class="sub-title">Choose your preferred payment method</p>

    <div class="total-box">
        Total: <span id="displayTotal">0</span> RWF
    </div>

    <div class="payment-methods">
        <div id="momoBtn" class="method active-momo" onclick="selectMethod('momo')">
            <span style="color: #ffc107;">●</span> MTN MoMo
        </div>
        <div id="airtelBtn" class="method" onclick="selectMethod('airtel')">
            <span style="color: #ff5252;">●</span> Airtel Money
        </div>
    </div>

    <div class="form-group">
        <label id="phoneLabel">Enter MTN Number</label>
        <input type="text" placeholder="078... / 079..." id="phoneNumber">
    </div>

    <button class="btn-pay" onclick="handlePayment()">Complete Payment</button>

    <p class="note">
        * You will receive a prompt on your phone to enter your PIN and authorize this transaction.
    </p>

    <a href="index.html" class="cancel-btn">Cancel and go back</a>
</div>

<script>
    // Gusoma amafaranga yavuye kuri paji yabanje (URL Parameters)
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const total = urlParams.get('total') || "0";
        document.getElementById('displayTotal').innerText = Number(total).toLocaleString();
    };

    function selectMethod(type) {
        const label = document.getElementById('phoneLabel');
        const input = document.getElementById('phoneNumber');
        const momoBtn = document.getElementById('momoBtn');
        const airtelBtn = document.getElementById('airtelBtn');
        
        if(type === 'momo') {
            label.innerText = "Enter MTN Number";
            input.placeholder = "078... / 079...";
            momoBtn.classList.add('active-momo');
            airtelBtn.classList.remove('active-airtel');
        } else {
            label.innerText = "Enter Airtel Number";
            input.placeholder = "072... / 073...";
            airtelBtn.classList.add('active-airtel');
            momoBtn.classList.remove('active-momo');
        }
    }

    function handlePayment() {
        const phone = document.getElementById('phoneNumber').value;
        if(phone.length < 10) {
            alert("Andika numero ya telefone neza!");
            return;
        }
        alert("Prompt yoherejwe kuri " + phone + ". Injiza PIN yawe kwemeza.");
        
        // Guhita yohereza umukiriya kuri paji y'intsinzi (success-order.html)
        window.location.href = 'success-order.html';
    }
</script>

</body>
</html>
